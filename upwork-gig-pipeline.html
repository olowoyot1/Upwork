<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upwork Gig Pipeline — Temidayo Olowoyo</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="ledger-root"></div>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  #ledger-root {
    --ink: #1A2438;
    --ink-soft: #2E3A52;
    --parchment: #F7F3EA;
    --parchment-dim: #EDE7D8;
    --emerald: #3A7D5C;
    --emerald-dim: #E8F0EA;
    --rust: #C2703D;
    --rust-dim: #F5E8DD;
    --slate: #6B7280;
    --brass: #B8923C;
    --line: #D8D1BE;
    --white: #FFFEFB;

    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    background: var(--parchment);
    min-height: 100vh;
    display: flex;
    font-size: 14px;
    line-height: 1.5;
  }

  #ledger-root * { box-sizing: border-box; }

  .serif { font-family: 'Source Serif 4', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ---- Rail ---- */
  .rail {
    width: 200px;
    flex-shrink: 0;
    background: var(--ink);
    color: var(--parchment);
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .rail-brand {
    padding: 0 24px 24px;
    border-bottom: 1px solid rgba(247,243,234,0.12);
    margin-bottom: 8px;
  }
  .rail-brand .name { font-family: 'Source Serif 4', serif; font-size: 17px; font-weight: 600; letter-spacing: 0.2px; }
  .rail-brand .tag { font-size: 11px; color: var(--brass); margin-top: 3px; letter-spacing: 0.4px; }
  .rail-nav { display: flex; flex-direction: column; padding: 8px 0; }
  .rail-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 24px;
    cursor: pointer;
    color: rgba(247,243,234,0.6);
    font-size: 13.5px;
    border-left: 2px solid transparent;
    transition: all 0.15s ease;
    user-select: none;
  }
  .rail-item:hover { color: var(--parchment); background: rgba(247,243,234,0.04); }
  .rail-item.active {
    color: var(--parchment);
    border-left: 2px solid var(--brass);
    background: rgba(184,146,60,0.08);
  }
  .rail-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
  .rail-item.active .dot { background: var(--brass); opacity: 1; }

  .rail-foot {
    margin-top: auto;
    padding: 16px 24px 4px;
    font-size: 10.5px;
    color: rgba(247,243,234,0.35);
    border-top: 1px solid rgba(247,243,234,0.1);
  }

  /* ---- Main ---- */
  .main { flex: 1; min-width: 0; padding: 28px 36px 60px; }

  /* Reconciliation strip - signature element */
  .strip {
    background: var(--ink);
    border-radius: 3px;
    padding: 18px 26px;
    margin-bottom: 28px;
    display: flex;
    align-items: stretch;
    gap: 0;
    position: relative;
    overflow: hidden;
  }
  .strip::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--brass), var(--emerald), var(--rust));
    opacity: 0.8;
  }
  .strip-cell { flex: 1; padding: 0 22px; position: relative; }
  .strip-cell + .strip-cell { border-left: 1px solid rgba(247,243,234,0.12); }
  .strip-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(247,243,234,0.45); margin-bottom: 6px; }
  .strip-value { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 500; color: var(--parchment); line-height: 1; }
  .strip-value .unit { font-size: 13px; color: rgba(247,243,234,0.4); margin-left: 4px; }
  .strip-sub { font-size: 11px; color: rgba(247,243,234,0.4); margin-top: 5px; }
  .strip-sub.up { color: var(--emerald); opacity: 0.9; }

  h1.page-title { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .page-sub { color: var(--slate); font-size: 13px; margin-bottom: 24px; }

  /* ---- Buttons ---- */
  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 9px 16px;
    border-radius: 3px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--parchment);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { background: var(--ink-soft); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { background: var(--white); border-color: var(--ink); }
  .btn.danger-ghost { background: transparent; color: var(--rust); border: 1px solid var(--rust); }
  .btn.danger-ghost:hover { background: var(--rust-dim); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.small { padding: 6px 11px; font-size: 12px; }

  /* ---- Ledger rows (pipeline) ---- */
  .ledger {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .ledger-head {
    display: grid;
    grid-template-columns: 1fr 130px 110px 90px 90px;
    padding: 10px 18px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--slate);
    background: var(--parchment-dim);
    border-bottom: 1px solid var(--line);
  }
  .ledger-row {
    display: grid;
    grid-template-columns: 1fr 130px 110px 90px 90px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    align-items: center;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-row:hover { background: var(--parchment-dim); }
  .ledger-job-title { font-weight: 500; font-size: 13.5px; margin-bottom: 2px; }
  .ledger-job-meta { font-size: 11.5px; color: var(--slate); }
  .ledger-rate { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .ledger-date { font-size: 12px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    padding: 4px 9px;
    border-radius: 100px;
    width: fit-content;
  }
  .status-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .status-saved { background: #EEF0F3; color: var(--slate); }
  .status-applied { background: #E5EEFA; color: #2E5C99; }
  .status-interview { background: var(--rust-dim); color: var(--rust); }
  .status-won { background: var(--emerald-dim); color: var(--emerald); }
  .status-lost { background: #F4E5E5; color: #A14848; }

  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--slate);
  }
  .empty-state .serif { font-size: 16px; color: var(--ink); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; margin: 0 0 18px; }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,36,56,0.45);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px; z-index: 100; overflow-y: auto;
  }
  .modal {
    background: var(--white);
    border-radius: 4px;
    max-width: 560px;
    width: 100%;
    padding: 28px 30px 26px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .modal h2 { font-family: 'Source Serif 4', serif; font-size: 18px; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13.5px;
    padding: 9px 11px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--parchment);
    color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--brass); background: var(--white);
  }
  .field textarea { resize: vertical; min-height: 70px; font-family: 'IBM Plex Sans', sans-serif; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* ---- Drafter ---- */
  .drafter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 20px;
  }
  .panel-title { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--slate); margin-bottom: 12px; font-weight: 600; }
  .draft-output {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--ink);
    min-height: 200px;
  }
  .draft-output.empty { color: var(--slate); font-style: italic; }
  .copy-row { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .char-count { font-size: 11px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; }

  /* ---- Templates ---- */
  .template-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .template-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .template-card-head .serif { font-size: 14.5px; font-weight: 600; }
  .template-tag { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--brass); margin-bottom: 4px; }
  .template-body { font-size: 13px; color: var(--ink-soft); white-space: pre-wrap; line-height: 1.55; }
  .template-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ---- Stats ---- */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-box {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
  }
  .stat-box .label { font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-box .value { font-family: 'IBM Plex Mono', monospace; font-size: 28px; color: var(--ink); }
  .funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .funnel-label { width: 90px; font-size: 12.5px; color: var(--ink-soft); flex-shrink: 0; }
  .funnel-track { flex: 1; height: 22px; background: var(--parchment-dim); border-radius: 2px; overflow: hidden; }
  .funnel-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .funnel-count { width: 34px; text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; flex-shrink: 0; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--parchment);
    padding: 10px 20px; border-radius: 3px; font-size: 13px;
    z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .loading-msg { text-align: center; padding: 60px; color: var(--slate); }

  @media (max-width: 720px) {
    .rail { width: 64px; }
    .rail-brand .name, .rail-brand .tag, .rail-item span.label { display: none; }
    .rail-brand { padding: 0 0 16px; text-align: center; }
    .rail-item { justify-content: center; padding: 13px 0; }
    .main { padding: 20px 16px 50px; }
    .drafter-grid { grid-template-columns: 1fr; }
    .field-row { grid-template-columns: 1fr; }
    .ledger-head { display: none; }
    .ledger-row { grid-template-columns: 1fr; gap: 6px; }
    .stats-grid { grid-template-columns: 1fr; }
    .strip { flex-direction: column; gap: 14px; padding: 16px 20px; }
    .strip-cell + .strip-cell { border-left: none; border-top: 1px solid rgba(247,243,234,0.12); padding-top: 14px; }
  }
</style>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

// ---------- Profile (seeded from CV) ----------
const PROFILE = {
  name: "Temidayo Olowoyo",
  title: "Finance Manager | Accountant | ERP & Automation Specialist",
  location: "Lagos, Nigeria",
  yearsExp: "10+",
  skills: [
    "Financial Reporting & Analysis", "ERP Implementation (Zoho, Oracle, Sage)",
    "GAAP & IFRS Compliance", "Budgeting & Forecasting", "Internal Controls & Risk Management",
    "Tax Planning", "Cash Flow Management", "AP/AR", "Payroll Processing",
    "Bookkeeping & Reconciliation", "Financial Modelling", "QuickBooks", "Zoho Finance Plus",
    "PHP", "cPanel", "Vercel", "GitHub", "Accounting Automation", "AI Tooling"
  ],
  highlights: [
    "Certified Zoho Finance Plus Implementation Partner for Africa",
    "Reduced operational expenses by 12% through targeted cost-saving measures",
    "Accelerated data processing speed by 35% via accounting software configuration",
    "Boosted ERP data accuracy by 30% and operational efficiency by 25%",
    "Drove an 18% revenue increase through profitability analysis",
    "Mitigated financial risk by 40% via enhanced internal controls",
    "10+ years across logistics, financial services, retail, and consulting"
  ],
  niche: "Finance & Accounting + ERP/Automation hybrid — rare combination of accounting depth (GAAP/IFRS, audit) and technical implementation (Zoho, PHP, automation, AI)."
};

const STORAGE_KEYS = {
  jobs: 'gigtool:jobs',
  templates: 'gigtool:templates',
  profile: 'gigtool:profile'
};

const DEFAULT_TEMPLATES = [
  {
    id: 't1',
    tag: 'Opener — ERP/Accounting Setup',
    title: 'ERP Implementation Opener',
    body: `I noticed you're looking for help with {specific_need} — this sits right in my lane. I'm a certified Zoho Finance Plus Implementation Partner with 10+ years across accounting and ERP rollouts (Zoho, Oracle, Sage), and I also build the automation layer around the books (PHP, scripted workflows, AI-assisted reporting) so the system doesn't just go live, it actually runs itself.`
  },
  {
    id: 't2',
    tag: 'Opener — Bookkeeping/Reconciliation',
    title: 'Bookkeeping Cleanup Opener',
    body: `Reconciliation backlogs and messy books are exactly what I get brought in to fix. In my current role I eliminated a multi-month reconciliation backlog and cut operational expenses by 12% by rebuilding the bookkeeping system from the ground up — happy to walk you through how I'd approach {specific_need}.`
  },
  {
    id: 't3',
    tag: 'Closer — Standard',
    title: 'Standard Closer',
    body: `I'm available to start {availability} and can hop on a quick call this week if useful. Happy to share examples of similar reconciliation/ERP work I've delivered. Looking forward to hearing more about the project.`
  }
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ---------- Storage helpers (plain localStorage — this file runs standalone in your browser) ----------
async function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* not found yet, or corrupted — fall back */ }
  return fallback;
}
async function saveKey(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error('Save failed', key, e);
  }
}

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2200);
    return () => clearTimeout(t);
  }, []);
  if (!message) return null;
  return <div className="toast">{message}</div>;
}

function StatusPill({ status }) {
  const map = {
    saved: { cls: 'status-saved', label: 'Saved' },
    applied: { cls: 'status-applied', label: 'Applied' },
    interview: { cls: 'status-interview', label: 'Interview' },
    won: { cls: 'status-won', label: 'Won' },
    lost: { cls: 'status-lost', label: 'Lost' },
  };
  const s = map[status] || map.saved;
  return <span className={`status-pill ${s.cls}`}><span className="dot"></span>{s.label}</span>;
}

function ReconciliationStrip({ jobs }) {
  const applied = jobs.filter(j => j.status !== 'saved').length;
  const interview = jobs.filter(j => j.status === 'interview' || j.status === 'won').length;
  const won = jobs.filter(j => j.status === 'won').length;
  const responseRate = applied > 0 ? Math.round((interview / applied) * 100) : 0;
  const winRate = applied > 0 ? Math.round((won / applied) * 100) : 0;

  return (
    <div className="strip">
      <div className="strip-cell">
        <div className="strip-label">Applied</div>
        <div className="strip-value">{applied}</div>
        <div className="strip-sub">{jobs.filter(j => j.status === 'saved').length} saved, not yet sent</div>
      </div>
      <div className="strip-cell">
        <div className="strip-label">Interviews</div>
        <div className="strip-value">{interview}</div>
        <div className="strip-sub up">{responseRate}% response rate</div>
      </div>
      <div className="strip-cell">
        <div className="strip-label">Won</div>
        <div className="strip-value">{won}</div>
        <div className="strip-sub up">{winRate}% win rate</div>
      </div>
      <div className="strip-cell">
        <div className="strip-label">Pipeline value</div>
        <div className="strip-value mono">
          ${jobs.filter(j => j.status !== 'lost').reduce((sum, j) => sum + (parseFloat(j.rate) || 0), 0).toLocaleString()}
          <span className="unit">est</span>
        </div>
        <div className="strip-sub">across active jobs</div>
      </div>
    </div>
  );
}

function JobModal({ job, onSave, onClose, onDelete }) {
  const [form, setForm] = useState(job || {
    id: uid(), title: '', client: '', rate: '', rateType: 'fixed',
    status: 'saved', dateAdded: new Date().toISOString().slice(0,10),
    jobPost: '', notes: '', link: ''
  });

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <h2 className="serif">{job ? 'Edit job' : 'Add a job'}</h2>
        <div className="field">
          <label>Job title</label>
          <input value={form.title} onChange={e => update('title', e.target.value)} placeholder="e.g. Zoho Books setup for logistics company" />
        </div>
        <div className="field-row">
          <div className="field">
            <label>Client / company</label>
            <input value={form.client} onChange={e => update('client', e.target.value)} placeholder="Optional" />
          </div>
          <div className="field">
            <label>Status</label>
            <select value={form.status} onChange={e => update('status', e.target.value)}>
              <option value="saved">Saved</option>
              <option value="applied">Applied</option>
              <option value="interview">Interview</option>
              <option value="won">Won</option>
              <option value="lost">Lost</option>
            </select>
          </div>
        </div>
        <div className="field-row">
          <div className="field">
            <label>Rate ($)</label>
            <input type="number" value={form.rate} onChange={e => update('rate', e.target.value)} placeholder="e.g. 800" />
          </div>
          <div className="field">
            <label>Rate type</label>
            <select value={form.rateType} onChange={e => update('rateType', e.target.value)}>
              <option value="fixed">Fixed price</option>
              <option value="hourly">Hourly</option>
            </select>
          </div>
        </div>
        <div className="field">
          <label>Job post (paste full text — used for proposal drafting)</label>
          <textarea value={form.jobPost} onChange={e => update('jobPost', e.target.value)} placeholder="Paste the Upwork job description here..." />
        </div>
        <div className="field">
          <label>Notes</label>
          <textarea value={form.notes} onChange={e => update('notes', e.target.value)} placeholder="Follow-ups, client tone, anything to remember" style={{minHeight: '50px'}} />
        </div>
        <div className="modal-actions">
          {job && <button className="btn danger-ghost" onClick={() => onDelete(form.id)}>Delete</button>}
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={() => onSave(form)}>{job ? 'Save changes' : 'Add job'}</button>
        </div>
      </div>
    </div>
  );
}

function PipelineView({ jobs, onAdd, onEdit }) {
  const sorted = [...jobs].sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
  return (
    <div>
      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '24px'}}>
        <div>
          <h1 className="page-title">Pipeline</h1>
          <div className="page-sub">Every job you've seen, applied to, or won — in one ledger.</div>
        </div>
        <button className="btn" onClick={onAdd}>+ Add job</button>
      </div>
      {sorted.length === 0 ? (
        <div className="ledger">
          <div className="empty-state">
            <div className="serif">No jobs logged yet</div>
            <p>Add a job to start tracking your pipeline.</p>
            <button className="btn" onClick={onAdd}>+ Add your first job</button>
          </div>
        </div>
      ) : (
        <div className="ledger">
          <div className="ledger-head">
            <div>Job</div><div>Status</div><div>Rate</div><div>Added</div><div></div>
          </div>
          {sorted.map(job => (
            <div className="ledger-row" key={job.id} onClick={() => onEdit(job)}>
              <div>
                <div className="ledger-job-title">{job.title || 'Untitled job'}</div>
                <div className="ledger-job-meta">{job.client || '—'}</div>
              </div>
              <div><StatusPill status={job.status} /></div>
              <div className="ledger-rate">{job.rate ? `$${parseFloat(job.rate).toLocaleString()}${job.rateType === 'hourly' ? '/hr' : ''}` : '—'}</div>
              <div className="ledger-date">{job.dateAdded}</div>
              <div></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DrafterView({ jobs, templates }) {
  const [selectedJobId, setSelectedJobId] = useState('');
  const [tone, setTone] = useState('confident');
  const [draft, setDraft] = useState('');
  const [copied, setCopied] = useState(false);

  const selectedJob = jobs.find(j => j.id === selectedJobId);

  const generateDraft = () => {
    if (!selectedJob) return;
    const post = (selectedJob.jobPost || '').toLowerCase();

    // Pick relevant skill angle based on job post keywords
    let angle = "general accounting and ERP support";
    if (post.includes('zoho')) angle = "Zoho implementation and configuration";
    else if (post.includes('reconcil') || post.includes('bookkeep')) angle = "bookkeeping cleanup and reconciliation";
    else if (post.includes('automat') || post.includes('php') || post.includes('script')) angle = "accounting automation and workflow scripting";
    else if (post.includes('forecast') || post.includes('budget')) angle = "financial modelling and forecasting";
    else if (post.includes('audit') || post.includes('compliance')) angle = "internal controls and audit-ready reporting";
    else if (post.includes('ai') || post.includes('dashboard')) angle = "AI-assisted financial reporting and dashboards";

    const opener = tone === 'confident'
      ? `Hi — this project lines up closely with what I do day to day. I'm a Finance Manager and Certified Zoho Finance Plus Implementation Partner with 10+ years across logistics, financial services, and retail, with a specific focus on ${angle}.`
      : `Hi there, thanks for posting this — I'd love to help. I'm an accountant and ERP specialist (10+ years, certified Zoho Finance Plus partner) with hands-on experience in ${angle}, which looks like a close match for what you need.`;

    const proof = `A couple of relevant results from recent work: cut operational expenses by 12% through targeted cost-saving measures, improved ERP data accuracy by 30%, and reduced financial risk by 40% through stronger internal controls. I also work comfortably with PHP, GitHub, and Vercel, so I can build the automation layer around the books, not just the books themselves.`;

    const closer = `Happy to jump on a quick call to talk through your specific setup, or share more detail on similar projects. Available to start right away.`;

    setDraft(`${opener}\n\n${proof}\n\n${closer}\n\n— ${PROFILE.name}`);
    setCopied(false);
  };

  const copyDraft = () => {
    navigator.clipboard.writeText(draft).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    });
  };

  return (
    <div>
      <h1 className="page-title">Proposal drafter</h1>
      <div className="page-sub">Pick a job, generate a tailored draft, edit it, then paste it into Upwork yourself.</div>

      <div className="drafter-grid">
        <div className="panel">
          <div className="panel-title">Source</div>
          <div className="field">
            <label>Which job is this for?</label>
            <select value={selectedJobId} onChange={e => { setSelectedJobId(e.target.value); setDraft(''); }}>
              <option value="">— select a job from your pipeline —</option>
              {jobs.map(j => <option key={j.id} value={j.id}>{j.title || 'Untitled job'}</option>)}
            </select>
          </div>
          {selectedJob && (
            <div className="field">
              <label>Job post excerpt</label>
              <div style={{
                background: 'var(--parchment-dim)', border: '1px solid var(--line)', borderRadius: '3px',
                padding: '10px 12px', fontSize: '12.5px', color: 'var(--ink-soft)', maxHeight: '160px',
                overflowY: 'auto', whiteSpace: 'pre-wrap'
              }}>
                {selectedJob.jobPost || 'No job post text saved for this entry — edit the job in Pipeline to add it.'}
              </div>
            </div>
          )}
          <div className="field">
            <label>Tone</label>
            <select value={tone} onChange={e => setTone(e.target.value)}>
              <option value="confident">Confident & direct</option>
              <option value="warm">Warm & collaborative</option>
            </select>
          </div>
          <button className="btn" style={{width: '100%', marginTop: '4px'}} disabled={!selectedJob} onClick={generateDraft}>
            Generate draft
          </button>
          {jobs.length === 0 && <div style={{fontSize: '12px', color: 'var(--slate)', marginTop: '10px'}}>Add a job in Pipeline first.</div>}
        </div>

        <div className="panel">
          <div className="panel-title">Draft proposal</div>
          <div className={`draft-output ${!draft ? 'empty' : ''}`}>
            {draft || 'Your generated draft will appear here. Edit freely before sending — this is a starting point, not a final answer.'}
          </div>
          {draft && (
            <div className="copy-row">
              <span className="char-count">{draft.length} characters</span>
              <button className="btn small" onClick={copyDraft}>{copied ? 'Copied ✓' : 'Copy to clipboard'}</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TemplatesView({ templates, onAdd, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(null);
  const [copiedId, setCopiedId] = useState(null);

  const copyTemplate = (t) => {
    navigator.clipboard.writeText(t.body).then(() => {
      setCopiedId(t.id);
      setTimeout(() => setCopiedId(null), 1500);
    });
  };

  return (
    <div>
      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '24px'}}>
        <div>
          <h1 className="page-title">Templates</h1>
          <div className="page-sub">Reusable openers and closers. Use <span className="mono">{'{specific_need}'}</span> and <span className="mono">{'{availability}'}</span> as fill-in variables.</div>
        </div>
        <button className="btn" onClick={() => setEditing({ id: uid(), tag: '', title: '', body: '' })}>+ New template</button>
      </div>

      {templates.map(t => (
        <div className="template-card" key={t.id}>
          <div className="template-card-head">
            <div>
              <div className="template-tag">{t.tag}</div>
              <div className="serif">{t.title}</div>
            </div>
          </div>
          <div className="template-body">{t.body}</div>
          <div className="template-actions">
            <button className="btn small ghost" onClick={() => copyTemplate(t)}>{copiedId === t.id ? 'Copied ✓' : 'Copy'}</button>
            <button className="btn small ghost" onClick={() => setEditing(t)}>Edit</button>
            <button className="btn small danger-ghost" onClick={() => onDelete(t.id)}>Delete</button>
          </div>
        </div>
      ))}

      {editing && (
        <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) setEditing(null); }}>
          <div className="modal">
            <h2 className="serif">{templates.find(t => t.id === editing.id) ? 'Edit template' : 'New template'}</h2>
            <div className="field">
              <label>Tag (category)</label>
              <input value={editing.tag} onChange={e => setEditing({...editing, tag: e.target.value})} placeholder="e.g. Opener — Audit work" />
            </div>
            <div className="field">
              <label>Title</label>
              <input value={editing.title} onChange={e => setEditing({...editing, title: e.target.value})} placeholder="Short internal name" />
            </div>
            <div className="field">
              <label>Body</label>
              <textarea value={editing.body} onChange={e => setEditing({...editing, body: e.target.value})} style={{minHeight: '140px'}} />
            </div>
            <div className="modal-actions">
              <button className="btn ghost" onClick={() => setEditing(null)}>Cancel</button>
              <button className="btn" onClick={() => {
                const exists = templates.find(t => t.id === editing.id);
                if (exists) onUpdate(editing); else onAdd(editing);
                setEditing(null);
              }}>Save template</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function StatsView({ jobs }) {
  const total = jobs.length;
  const counts = {
    saved: jobs.filter(j => j.status === 'saved').length,
    applied: jobs.filter(j => j.status === 'applied').length,
    interview: jobs.filter(j => j.status === 'interview').length,
    won: jobs.filter(j => j.status === 'won').length,
    lost: jobs.filter(j => j.status === 'lost').length,
  };
  const appliedTotal = total - counts.saved;
  const responseRate = appliedTotal > 0 ? Math.round(((counts.interview + counts.won) / appliedTotal) * 100) : 0;
  const winRate = appliedTotal > 0 ? Math.round((counts.won / appliedTotal) * 100) : 0;
  const avgRate = jobs.filter(j => j.rate).length > 0
    ? Math.round(jobs.reduce((s, j) => s + (parseFloat(j.rate) || 0), 0) / jobs.filter(j => j.rate).length)
    : 0;

  const funnelColors = { saved: '#9CA3AF', applied: '#3E6FB5', interview: 'var(--rust)', won: 'var(--emerald)', lost: '#A14848' };
  const maxCount = Math.max(1, ...Object.values(counts));

  const last7Days = jobs.filter(j => {
    const d = new Date(j.dateAdded);
    const diff = (new Date() - d) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  }).length;

  return (
    <div>
      <h1 className="page-title">Stats</h1>
      <div className="page-sub">How your pipeline is actually performing.</div>

      <div className="stats-grid">
        <div className="stat-box">
          <div className="label">Response rate</div>
          <div className="value">{responseRate}%</div>
        </div>
        <div className="stat-box">
          <div className="label">Win rate</div>
          <div className="value">{winRate}%</div>
        </div>
        <div className="stat-box">
          <div className="label">Added this week</div>
          <div className="value">{last7Days}</div>
        </div>
      </div>

      <div className="panel">
        <div className="panel-title">Pipeline funnel</div>
        {['saved', 'applied', 'interview', 'won', 'lost'].map(key => (
          <div className="funnel-row" key={key}>
            <div className="funnel-label" style={{textTransform: 'capitalize'}}>{key}</div>
            <div className="funnel-track">
              <div className="funnel-fill" style={{
                width: `${(counts[key] / maxCount) * 100}%`,
                background: funnelColors[key]
              }}></div>
            </div>
            <div className="funnel-count">{counts[key]}</div>
          </div>
        ))}
        {avgRate > 0 && (
          <div style={{marginTop: '16px', paddingTop: '14px', borderTop: '1px solid var(--line)', fontSize: '12.5px', color: 'var(--slate)'}}>
            Average rate across logged jobs: <span className="mono" style={{color: 'var(--ink)'}}>${avgRate.toLocaleString()}</span>
          </div>
        )}
      </div>
    </div>
  );
}

function ProfileSnapshot() {
  return (
    <div className="panel" style={{marginBottom: '24px'}}>
      <div className="panel-title">Your positioning</div>
      <div style={{fontSize: '13px', color: 'var(--ink-soft)', lineHeight: '1.6'}}>{PROFILE.niche}</div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('pipeline');
  const [jobs, setJobs] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modalJob, setModalJob] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [toast, setToast] = useState('');

  useEffect(() => {
    (async () => {
      const loadedJobs = await loadKey(STORAGE_KEYS.jobs, []);
      const loadedTemplates = await loadKey(STORAGE_KEYS.templates, DEFAULT_TEMPLATES);
      setJobs(loadedJobs);
      setTemplates(loadedTemplates);
      setLoading(false);
    })();
  }, []);

  const persistJobs = useCallback((newJobs) => {
    setJobs(newJobs);
    saveKey(STORAGE_KEYS.jobs, newJobs);
  }, []);

  const persistTemplates = useCallback((newTemplates) => {
    setTemplates(newTemplates);
    saveKey(STORAGE_KEYS.templates, newTemplates);
  }, []);

  const handleSaveJob = (job) => {
    const exists = jobs.find(j => j.id === job.id);
    const newJobs = exists ? jobs.map(j => j.id === job.id ? job : j) : [...jobs, job];
    persistJobs(newJobs);
    setModalJob(null);
    setShowAddModal(false);
    setToast(exists ? 'Job updated' : 'Job added to pipeline');
  };

  const handleDeleteJob = (id) => {
    persistJobs(jobs.filter(j => j.id !== id));
    setModalJob(null);
    setToast('Job deleted');
  };

  if (loading) {
    return <div className="loading-msg">Loading your pipeline…</div>;
  }

  const navItems = [
    { key: 'pipeline', label: 'Pipeline' },
    { key: 'drafter', label: 'Drafter' },
    { key: 'templates', label: 'Templates' },
    { key: 'stats', label: 'Stats' },
  ];

  return (
    <React.Fragment>
      <div className="rail">
        <div className="rail-brand">
          <div className="name serif">{PROFILE.name.split(' ')[0]}'s Desk</div>
          <div className="tag">UPWORK LEDGER</div>
        </div>
        <div className="rail-nav">
          {navItems.map(item => (
            <div key={item.key} className={`rail-item ${view === item.key ? 'active' : ''}`} onClick={() => setView(item.key)}>
              <span className="dot"></span><span className="label">{item.label}</span>
            </div>
          ))}
        </div>
        <div className="rail-foot">All submissions happen on Upwork — this tool drafts, tracks, never auto-applies.</div>
      </div>

      <div className="main">
        <ReconciliationStrip jobs={jobs} />
        {view === 'pipeline' && (
          <PipelineView jobs={jobs} onAdd={() => setShowAddModal(true)} onEdit={setModalJob} />
        )}
        {view === 'drafter' && (
          <React.Fragment>
            <ProfileSnapshot />
            <DrafterView jobs={jobs} templates={templates} />
          </React.Fragment>
        )}
        {view === 'templates' && (
          <TemplatesView
            templates={templates}
            onAdd={(t) => { persistTemplates([...templates, t]); setToast('Template saved'); }}
            onUpdate={(t) => { persistTemplates(templates.map(x => x.id === t.id ? t : x)); setToast('Template updated'); }}
            onDelete={(id) => { persistTemplates(templates.filter(x => x.id !== id)); setToast('Template deleted'); }}
          />
        )}
        {view === 'stats' && <StatsView jobs={jobs} />}
      </div>

      {(modalJob || showAddModal) && (
        <JobModal
          job={modalJob}
          onSave={handleSaveJob}
          onDelete={handleDeleteJob}
          onClose={() => { setModalJob(null); setShowAddModal(false); }}
        />
      )}

      <Toast message={toast} onDone={() => setToast('')} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('ledger-root')).render(<App />);
</script>
</body></html>
